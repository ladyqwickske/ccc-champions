<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cCc Champions - Calendar</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <script src="perf-debug.js"></script>
  <script src="config.js"></script>
  <script src="portal-shim.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      color: #f3f3f3;
      text-align: center;
      padding: 32px 16px 60px 16px;
      min-height: 100vh;
      background-attachment: fixed;
    }
    body { top: 0 !important; }
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    .goog-te-balloon-frame { display: none !important; }
    html, body { margin-top: 0 !important; top: 0 !important; }
    body.translated-ltr, body.translated-rtl { margin-top: 0 !important; top: 0 !important; }
    .goog-te-banner-frame, iframe.goog-te-banner-frame, .goog-te-banner-frame.skiptranslate { display: none !important; visibility: hidden !important; height: 0 !important; }
    #goog-gt-tt, .goog-te-balloon-frame { display: none !important; visibility: hidden !important; }
    .goog-text-highlight { background: transparent !important; box-shadow: none !important; }
    #google_translate_element, #translateToggleBtn { top: auto !important; right: 8px !important; bottom: 8px !important; }

    .tab-content { padding: 16px; max-width: 1400px; margin: 0 auto; background: rgba(30, 34, 40, 0.95); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #ffb300; text-shadow: 0 2px 8px #000a; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .header { margin-bottom: 16px; }
    .header p { color: #b0b0b0; font-size: 14px; text-align: center; }

    /* ── Calendar styles ───────────────────────────── */
    .cal-toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .cal-toolbar button {
      background: #232526;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cal-toolbar button:hover { background: #333; color: #ffb300; border-color: #ffb300; }
    .cal-month-label { font-size: 20px; font-weight: 700; color: #ffb300; min-width: 200px; text-align: center; }
    .cal-today-btn { font-weight: 600; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: #333;
      border: 1px solid #444;
      border-radius: 10px;
      overflow: hidden;
    }
    .cal-dow {
      background: #1a1d21;
      color: #ffb300;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 4px;
      text-align: center;
    }
    .cal-day {
      background: #232526;
      min-height: 90px;
      padding: 4px;
      text-align: left;
      position: relative;
      transition: background 0.15s;
      cursor: default;
    }
    .cal-day:hover { background: #2a2d30; }
    .cal-day.other-month { background: #1a1c1e; }
    .cal-day.other-month .cal-day-num { color: #555; }
    .cal-day.today { box-shadow: inset 0 0 0 2px #ffb300; }
    .cal-day-num {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
    }
    .cal-day.today .cal-day-num { background: #ffb300; color: #232526; }

    .cal-event {
      display: block;
      font-size: 11px;
      padding: 2px 5px;
      margin: 1px 0;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      line-height: 1.4;
      font-weight: 500;
      transition: filter 0.15s;
    }
    .cal-event:hover { filter: brightness(1.2); }
    /* Event color palette */
    .cal-event.color-amber   { background: #ffb300; color: #232526; }
    .cal-event.color-blue    { background: #42a5f5; color: #fff; }
    .cal-event.color-green   { background: #66bb6a; color: #232526; }
    .cal-event.color-red     { background: #ef5350; color: #fff; }
    .cal-event.color-purple  { background: #ab47bc; color: #fff; }
    .cal-event.color-cyan    { background: #26c6da; color: #232526; }
    .cal-event.color-orange  { background: #ff7043; color: #fff; }
    .cal-event.color-pink    { background: #ec407a; color: #fff; }
    .cal-event.color-teal    { background: #26a69a; color: #fff; }
    .cal-event.color-indigo  { background: #5c6bc0; color: #fff; }
    .cal-event.color-lime    { background: #9ccc65; color: #232526; }
    .cal-event.color-brown   { background: #8d6e63; color: #fff; }
    .cal-event.color-crimson  { background: #d32f2f; color: #fff; }
    .cal-event.color-gold    { background: #ffd700; color: #232526; }
    .cal-event.color-silver  { background: #b0bec5; color: #232526; }
    .cal-event.color-caramel  { background: #c68642; color: #fff; }

    .cal-more {
      font-size: 10px;
      color: #ffb300;
      padding: 1px 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .cal-more:hover { text-decoration: underline; }

    /* ── Event detail popup ──────────────────────── */
    .event-popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }
    .event-popup-overlay.open { display: flex; }
    .event-popup {
      background: #232526;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 24px;
      max-width: 420px;
      width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: left;
    }
    .event-popup h3 { color: #ffb300; margin-bottom: 12px; font-size: 18px; }
    .event-popup .ep-row { margin-bottom: 8px; font-size: 14px; color: #e0e0e0; }
    .event-popup .ep-label { font-weight: 600; color: #ffb300; }
    .event-popup .ep-desc { margin-top: 12px; background: #1a1d21; border-radius: 6px; padding: 10px; font-size: 13px; color: #ccc; line-height: 1.5; white-space: pre-wrap; }
    .event-popup .ep-close {
      margin-top: 16px;
      display: inline-block;
      padding: 8px 20px;
      background: #ffb300;
      color: #232526;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .event-popup .ep-color-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* ── Day detail popup (shows all events for a day) ── */
    .day-popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 7500;
      align-items: center;
      justify-content: center;
    }
    .day-popup-overlay.open { display: flex; }
    .day-popup {
      background: #232526;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 24px;
      max-width: 380px;
      width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: left;
      max-height: 80vh;
      overflow-y: auto;
    }
    .day-popup h3 { color: #ffb300; margin-bottom: 12px; font-size: 18px; }
    .day-popup .dp-event {
      padding: 8px 10px;
      margin-bottom: 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: filter 0.15s;
    }
    .day-popup .dp-event:hover { filter: brightness(1.2); }
    .day-popup .dp-time { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .day-popup .dp-close {
      margin-top: 12px;
      display: inline-block;
      padding: 8px 20px;
      background: #ffb300;
      color: #232526;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Upcoming events sidebar ─────────────────── */
    .cal-layout { display: flex; gap: 16px; align-items: flex-start; }
    .cal-main { flex: 1; min-width: 0; }
    .cal-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #1a1d21;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 16px;
      text-align: left;
      max-height: 600px;
      overflow-y: auto;
    }
    .cal-sidebar h3 { color: #ffb300; font-size: 15px; margin-bottom: 12px; }
    .cal-sidebar-event {
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .cal-sidebar-event:hover { filter: brightness(1.2); }
    .cal-sidebar-event .se-title { font-weight: 600; font-size: 13px; }
    .cal-sidebar-event .se-date { opacity: 0.8; margin-top: 2px; }
    .cal-sidebar-empty { color: #666; font-size: 13px; font-style: italic; }

    @media (max-width: 900px) {
      .cal-layout { flex-direction: column; }
      .cal-sidebar { width: 100%; max-height: 300px; }
    }
    @media (max-width: 600px) {
      .cal-day { min-height: 60px; }
      .cal-event { font-size: 9px; padding: 1px 3px; }
      .cal-day-num { font-size: 11px; }
      .cal-dow { font-size: 10px; padding: 6px 2px; }
      .cal-month-label { font-size: 16px; min-width: 160px; }
    }

    /* ── Sticky Navigation Bar ───────────────────── */
    .tab-nav {
      background: rgba(30, 34, 40, 0.95);
      border-bottom: 1px solid #444;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 9999;
      width: 100%;
      left: 0; right: 0;
      overflow: visible;
    }
    .tab-nav-container { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; padding: 0 16px; overflow: visible; flex-wrap: wrap; }
    .nav-brand { font-size: 20px; font-weight: 700; color: #ffb300; padding: 16px 0; margin-right: 32px; white-space: nowrap; display: flex; align-items: center; gap: 8px; text-shadow: 0 2px 8px #000a; }
    .nav-brand img { height: 32px; width: auto; }
    .tab-buttons {
      display: flex; gap: 4px; flex: 1;
      overflow-x: auto; overflow-y: hidden;
      align-items: center; height: 100px;
    }
    .tab-btn {
      padding: 12px 16px; background: none; border: none;
      color: #e0e0e0; font-size: 28px; font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all 0.2s; white-space: nowrap;
      text-decoration: none; display: block; cursor: pointer; position: relative;
    }
    .tab-btn:hover { color: #ffb300; background: #232526; }
    .tab-btn.active { color: #ffb300; border-bottom-color: #ffb300; }
    .tab-btn[title]:hover::after {
      content: attr(title);
      position: absolute; top: -42px; left: 50%; transform: translateX(-50%);
      background: #232526; color: #ffb300; padding: 6px 12px; border-radius: 4px;
      font-size: 12px; white-space: nowrap; z-index: 1001;
      border: 1px solid #444; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tab-btn .tab-icon {
      display: block; margin: 0 auto; height: 40px; width: auto;
      font-size: 16px; line-height: 1.2; font-weight: 500;
      white-space: nowrap; filter: drop-shadow(0 2px 8px #000a);
    }
    .tab-icon-emoji {
      display: block; margin: 0 auto; font-size: 32px;
      line-height: 40px; height: 40px;
      filter: drop-shadow(0 2px 8px #000a);
    }
    .tab-label.mobile-only { display: none; }
    .tab-icon.desktop-only { display: block; margin: 0 auto; height: 40px; width: auto; }
    .hamburger {
      display: none; flex-direction: column; gap: 4px;
      background: none; border: none; cursor: pointer; padding: 8px;
    }
    .hamburger span { display: block; width: 24px; height: 3px; background: #ffb300; border-radius: 2px; transition: all 0.2s; }

    .login-bar { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .login-bar .user-email { color: #ffb300; font-size: 13px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .login-bar button { padding: 6px 14px; border: 1px solid #444; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    #loginBtn { background: #1a1b1c; color: #ffb300; }
    #loginBtn:hover { background: #2a2b2c; }
    #logoutBtn { background: #c62828; color: #fff; border-color: #c62828; }
    #logoutBtn:hover { background: #e53935; }

    @media (max-width: 800px) {
      .tab-nav { position: fixed; top: 0; left: 0; right: 0; width: 100%; z-index: 9999; }
      .tab-nav-container { flex-wrap: wrap; padding: 8px; }
      .nav-brand { flex: 1; margin-right: 8px; font-size: 16px; padding: 8px 0; }
      .nav-brand img { height: 24px; width: 24px; }
      .hamburger { display: flex; order: 2; }
      .tab-buttons {
        flex-direction: column; align-items: stretch;
        max-height: 60vh; overflow-y: auto; background: #232526;
        position: absolute; top: 60px; left: 0; right: 0; width: 100%;
        z-index: 10000; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.25); display: none; order: 10; height: auto;
      }
      .tab-buttons.open { display: flex; }
      .tab-btn {
        font-size: 18px; padding: 18px 24px; border-bottom: 1px solid #444;
        display: flex; align-items: center; justify-content: flex-start;
        background: none; height: auto;
      }
      .tab-btn:last-child { border-bottom: none; }
      .tab-label.mobile-only { display: inline; }
      .tab-icon.desktop-only { display: none; }
      .tab-icon-emoji.desktop-only { display: none; }
      .login-bar { margin-left: 0; margin-top: 8px; justify-content: center; }
      body { padding-top: 100px; }
    }
    @media (min-width: 801px) {
      .tab-label.mobile-only { display: none; }
      .tab-icon.desktop-only { display: block; }
      .tab-icon-emoji.desktop-only { display: block; }
      .tab-buttons {
        flex-direction: row; align-items: center; position: static;
        max-height: none; overflow-y: visible; background: none;
        box-shadow: none; border-radius: 0; display: flex !important;
      }
      .tab-btn { font-size: 28px; padding: 12px 16px; border-bottom: 3px solid transparent; display: block; justify-content: center; }
      .hamburger { display: none; }
    }
  </style>
</head>
<body>
  <!-- Google Translate Widget -->
  <div id="google_translate_element" style="position:fixed;bottom:8px;right:8px;z-index:7000;"></div>
  <button id="translateToggleBtn" type="button" aria-label="Toggle translation" style="position:fixed;bottom:8px;right:8px;z-index:7001;display:none;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid #444;border-radius:8px;background:#232526;color:#ffb300;font-size:18px;cursor:pointer;">🌐</button>
  <style>
    @media (max-width: 800px) {
      #google_translate_element { max-width:0;overflow:hidden;opacity:0;pointer-events:none;transition:max-width .2s,opacity .2s; }
      body.translate-open #google_translate_element { max-width:260px;opacity:1;pointer-events:auto; }
      #translateToggleBtn { display: inline-flex !important; }
    }
    @media (min-width: 801px) { #translateToggleBtn { display: none !important; } }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var tb = document.getElementById('translateToggleBtn'), tw = document.getElementById('google_translate_element');
      if (!tb || !tw) return;
      tb.addEventListener('click', function (e) { e.stopPropagation(); document.body.classList.toggle('translate-open'); });
      document.addEventListener('click', function (e) { if (!document.body.classList.contains('translate-open')) return; if (tw.contains(e.target) || tb.contains(e.target)) return; document.body.classList.remove('translate-open'); });
    });
  </script>
  <script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:'en',layout:google.translate.TranslateElement.InlineLayout.SIMPLE},'google_translate_element');}</script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <!-- Auth -->
  <script>
    let isLoggedIn = false;
    let currentUser = null;
    const AUTH_KEY = 'ccc_portal_google_auth';
    const AUTH_EMAIL_KEY = 'ccc_portal_google_email';

    function checkLoginState() {
      try {
        const token = localStorage.getItem(AUTH_KEY);
        const email = localStorage.getItem(AUTH_EMAIL_KEY);
        if (token && email) {
          isLoggedIn = true;
          currentUser = email;
        }
      } catch (e) {}
      updateLoginUI();
    }

    function handleLogin() {
      const loginBtn = document.getElementById('loginBtn');
      if (loginBtn) { loginBtn.disabled = true; loginBtn.textContent = 'Loading...'; }
      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.onload = () => initGoogleLogin();
      script.onerror = () => {
        showToast('Failed to load Google Sign-In', true);
        if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = '🔑 Login'; }
      };
      document.head.appendChild(script);
    }

    function initGoogleLogin() {
      try {
        google.accounts.id.initialize({
          client_id: '47674606892-0m90hd0cd01kijo69ssuqtn1j3igp32i.apps.googleusercontent.com',
          callback: handleGoogleCallback,
          auto_select: false,
          ux_mode: 'popup'
        });
        google.accounts.id.prompt();
      } catch (e) {
        showToast('Google Sign-In error', true);
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = '🔑 Login'; }
      }
    }

    async function handleGoogleCallback(response) {
      const idToken = response.credential;
      try {
        const cfWorkerUrl = window.CLOUDFLARE_WORKER_URL || window.GAS_WEB_APP_URL;
        const tokenRes = await fetch(cfWorkerUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken })
        });
        const tokenData = await tokenRes.json();
        if (!tokenData.success || !tokenData.token_verified) throw new Error(tokenData.error || 'Token verification failed');
        const email = tokenData.email;
        const res = await fetch(window.GAS_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'verifyUserPermission', email })
        });
        const data = await res.json();
        if (data.isAllowedEditor) {
          try { localStorage.setItem(AUTH_KEY, idToken); } catch (e) {}
          try { localStorage.setItem(AUTH_EMAIL_KEY, email); } catch (e) {}
          isLoggedIn = true;
          currentUser = email;
          updateLoginUI();
          showToast('Signed in as ' + email);
        } else {
          showToast('Your account does not have editor access', true);
        }
      } catch (error) {
        console.error('Sign-in error:', error);
        showToast('Sign-in failed: ' + error.message, true);
      }
      const loginBtn = document.getElementById('loginBtn');
      if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = '🔑 Login'; }
    }

    function handleLogout() {
      try { localStorage.removeItem(AUTH_KEY); } catch (e) {}
      try { localStorage.removeItem(AUTH_EMAIL_KEY); } catch (e) {}
      isLoggedIn = false;
      currentUser = null;
      updateLoginUI();
      showToast('Logged out');
    }

    function updateLoginUI() {
      const userEmail = document.getElementById('userEmail');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      if (userEmail) userEmail.textContent = isLoggedIn ? currentUser : '';
      if (loginBtn) loginBtn.style.display = isLoggedIn ? 'none' : '';
      if (logoutBtn) logoutBtn.style.display = isLoggedIn ? '' : 'none';
      const restrictedTabs = ['events.html', 'members.html', 'warnings.html', 'profiling.html', 'resources.html'];
      restrictedTabs.forEach(href => {
        document.querySelectorAll(`.tab-buttons .tab-btn[href="${href}"]`).forEach(link => {
          link.style.display = isLoggedIn ? '' : 'none';
        });
      });
      const bankTab = document.getElementById('bankTabBtn');
      if (bankTab) bankTab.style.display = isLoggedIn ? 'flex' : 'none';
    }

    function showToast(msg, isError) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;color:#fff;background:' + (isError ? '#c62828' : '#2e7d32');
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', function() {
      checkLoginState();
      // Hamburger
      var hb=document.getElementById('navHamburger'),nt=document.getElementById('navTabs');
      if(hb&&nt){hb.addEventListener('click',function(){nt.classList.toggle('open');});document.addEventListener('click',function(e){if(!hb.contains(e.target)&&!nt.contains(e.target))nt.classList.remove('open');});}
    });
  </script>

  <!-- Navigation -->
  <nav class="tab-nav">
    <div class="tab-nav-container">
      <div class="nav-brand" id="navBrand"><img src="favicon.png" alt="" style="height:32px;width:32px;vertical-align:middle;margin-right:8px;"> cCc Champions</div>
      <button class="hamburger" id="navHamburger" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
      <div class="tab-buttons" id="navTabs">
        <a href="dashboard.html" class="tab-btn" title="Dashboard"><img src="chests.png" alt="Dashboard" class="tab-icon desktop-only"><span class="tab-label mobile-only">Dashboard</span></a>

        <a href="members.html" class="tab-btn" title="Members"><img src="members.png" alt="Members" class="tab-icon desktop-only"><span class="tab-label mobile-only">Members</span></a>

  <!-- Main Content -->
  <div class="tab-content active">
    <div class="header">
      <h1><img src="calendar.png" alt="" style="height:32px;width:32px;vertical-align:middle;"> Event Calendar</h1>
      <p>Overview of all the upcoming events</p>
    </div>

    <!-- Calendar Toolbar -->
    <div class="cal-toolbar">
      <button onclick="calNav(-1)">◀ Prev</button>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <button onclick="calNav(1)">Next ▶</button>
      <button class="cal-today-btn" onclick="calToday()">Today</button>
    </div>

    <div class="cal-layout">
      <div class="cal-main">
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="cal-sidebar" id="calSidebar">
        <h3>📋 Upcoming Events</h3>
        <div id="calUpcoming"></div>
      </div>
    </div>
  </div>

  <!-- Event Detail Popup -->
  <div class="event-popup-overlay" id="eventPopupOverlay">
    <div class="event-popup" id="eventPopup">
      <h3 id="epTitle"></h3>
      <div class="ep-row"><span class="ep-label">📅 Date:</span> <span id="epDate"></span></div>
      <div class="ep-row"><span class="ep-label">⏰ Time:</span> <span id="epTime"></span></div>
      <div class="ep-row"><span class="ep-label">🏷️ Category:</span> <span id="epCategory"></span></div>
      <div class="ep-desc" id="epDesc" style="display:none;"></div>
      <button class="ep-close" onclick="closeEventPopup()">Close</button>
    </div>
  </div>

  <!-- Day Detail Popup (all events for a day) -->
  <div class="day-popup-overlay" id="dayPopupOverlay">
    <div class="day-popup" id="dayPopup">
      <h3 id="dpTitle"></h3>
      <div id="dpEvents"></div>
      <button class="dp-close" onclick="closeDayPopup()">Close</button>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    /* ── Color palette for events ───────────────── */
    var COLORS = ['amber','blue','green','red','purple','cyan','orange','pink','teal','indigo','lime','brown','crimson','gold','silver','caramel'];
    var COLOR_HEX = {amber:'#ffb300',blue:'#42a5f5',green:'#66bb6a',red:'#ef5350',purple:'#ab47bc',cyan:'#26c6da',orange:'#ff7043',pink:'#ec407a',teal:'#26a69a',indigo:'#5c6bc0',lime:'#9ccc65',brown:'#8d6e63',crimson:'#d32f2f',gold:'#ffd700',silver:'#b0bec5',caramel:'#c68642'};

    /* ── Recurring event definitions (from Google Calendar ICS) ─── */
    // Each entry: title, firstStart (YYYY-MM-DD), duration (days), intervalDays, color, category, description
    var RECURRING = [
      { title: 'Doomsday',          firstStart: '2026-03-01', duration: 1, interval: 6,  color: 'teal',    category: 'Daily Event', description: 'Doomsday — recurring every 6 days.' },
      { title: 'Arachne\'s Swarm',  firstStart: '2026-03-02', duration: 1, interval: 6,  color: 'purple',  category: 'Daily Event', description: 'Arachne\'s Swarm — recurring every 6 days.' },
      { title: 'Ruthless Slaughter',firstStart: '2026-03-03', duration: 1, interval: 6,  color: 'silver',  category: 'Daily Event', description: 'Ruthless Slaughter — recurring every 6 days.' },
      { title: 'Crypt Start',firstStart: '2026-03-03', duration: 1, interval: 6, color: 'caramel', category: 'Crypting', description: 'Crypting period starts — same day as Ruthless Slaughter.' },
      { title: 'Crypt End',  firstStart: '2026-03-08', duration: 1, interval: 6, color: 'caramel', category: 'Crypting', description: 'Crypting period ends — the day before the next Ruthless Slaughter.' },
      { title: 'Ancients',          firstStart: '2026-03-03', duration: 1, interval: 6,  color: 'amber',   category: 'Daily Event', description: 'Ancients — 2-day event (Towers day 1, Tin Man day 2).' },
      { title: 'Thirst for Battle', firstStart: '2026-03-05', duration: 1, interval: 6,  color: 'cyan',    category: 'Daily Event', description: 'Thirst for Battle — recurring every 6 days.' },
      { title: 'The Great Hunt',    firstStart: '2026-03-06', duration: 1, interval: 6,  color: 'green',   category: 'Daily Event', description: 'The Great Hunt — recurring every 6 days.' },
      { title: 'KvK',               firstStart: '2026-03-05', duration: 1, interval: 24, color: 'pink',    category: 'Major Event', description: 'Kingdom vs Kingdom — recurring every 24 days.' },
      { title: 'CoT',               firstStart: '2026-03-10', duration: 2, interval: 12, color: 'blue',    category: 'Major Event', description: 'Clash for the Throne — 2-day event recurring every 12 days.' },
      { title: 'Armageddon',        firstStart: '2026-03-17', duration: 2, interval: 24, color: 'orange',  category: 'Major Event', description: 'Armageddon — 2-day event recurring every 24 days.' },
      { title: 'Dark Omens',        firstStart: '2026-03-20', duration: 2, interval: 24, color: 'indigo',  category: 'Major Event', description: 'Dark Omens — 2-day event recurring every 24 days.' },
      { title: 'Shadow Invasion',   firstStart: '2026-03-23', duration: 2, interval: 24, color: 'brown',   category: 'Major Event', description: 'Shadow Invasion — 2-day event recurring every 24 days.' },
      { title: 'HellForge',         firstStart: '2026-03-29', duration: 2, interval: 24, color: 'crimson', category: 'Major Event', description: 'HellForge — 2-day event recurring every 24 days.' },
      { title: 'Olympus',           firstStart: '2026-03-29', duration: 5, interval: 24, color: 'gold',    category: 'Major Event', description: 'Olympus — 5-day event recurring every 24 days.' },
      { title: 'Ragnarok',          firstStart: '2026-04-04', duration: 2, interval: 24, color: 'lime',    category: 'Major Event', description: 'Ragnarok — 2-day event.' },
    ];

    // Expand recurring definitions into concrete EVENTS for the visible window
    function expandRecurring(rangeStart, rangeEnd) {
      var events = [];
      for (var r = 0; r < RECURRING.length; r++) {
        var def = RECURRING[r];
        var first = parseDate(def.firstStart);
        var dur = def.duration;
        var interval = def.interval;
        // Find the first occurrence that could overlap with rangeStart
        var diffDays = Math.floor((rangeStart - first) / 86400000);
        var skipCount = diffDays > 0 ? Math.floor(diffDays / interval) : 0;
        var occ = new Date(first.getTime() + skipCount * interval * 86400000);
        // Generate occurrences until past rangeEnd
        for (var safety = 0; safety < 200; safety++) {
          var occEnd = new Date(occ.getTime() + (dur - 1) * 86400000);
          if (occ > rangeEnd) break;
          if (occEnd >= rangeStart) {
            var ev = { title: def.title, date: fmtDate(occ), color: def.color, category: def.category, description: def.description };
            if (dur > 1) ev.endDate = fmtDate(occEnd);
            events.push(ev);
          }
          occ = new Date(occ.getTime() + interval * 86400000);
        }
      }
      return events;
    }
    function parseDate(s) { var p = s.split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
    function fmtDate(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }

    var EVENTS = []; // populated dynamically by expandRecurring() in render()

    /* ── State ────────────────────────────────────── */
    var viewYear, viewMonth; // 0-indexed month

    function init() {
      var now = new Date();
      viewYear = now.getFullYear();
      viewMonth = now.getMonth();
      render();
    }

    window.calNav = function(dir) { viewMonth += dir; if (viewMonth < 0) { viewMonth = 11; viewYear--; } else if (viewMonth > 11) { viewMonth = 0; viewYear++; } render(); };
    window.calToday = function() { var n = new Date(); viewYear = n.getFullYear(); viewMonth = n.getMonth(); render(); };

    /* ── Render ───────────────────────────────────── */
    function render() {
      // Expand recurring events for the visible month ± 1 month buffer
      var rangeStart = new Date(viewYear, viewMonth - 1, 1);
      var rangeEnd = new Date(viewYear, viewMonth + 2, 0);
      EVENTS = expandRecurring(rangeStart, rangeEnd);

      var grid = document.getElementById('calGrid');
      var label = document.getElementById('calMonthLabel');
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      label.textContent = months[viewMonth] + ' ' + viewYear;

      // Day-of-week headers
      var html = '';
      var dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      for (var d = 0; d < 7; d++) html += '<div class="cal-dow">' + dows[d] + '</div>';

      // First day of month (0=Sun ... 6=Sat) → convert to Mon-start
      var firstDay = new Date(viewYear, viewMonth, 1).getDay();
      var startOffset = (firstDay === 0) ? 6 : firstDay - 1; // Mon=0
      var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      var prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

      var today = new Date();
      var todayStr = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());

      var totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

      for (var i = 0; i < totalCells; i++) {
        var dayNum, dateStr, isOther = false;
        if (i < startOffset) {
          // Previous month
          dayNum = prevMonthDays - startOffset + i + 1;
          var pm = viewMonth === 0 ? 11 : viewMonth - 1;
          var py = viewMonth === 0 ? viewYear - 1 : viewYear;
          dateStr = py + '-' + pad(pm + 1) + '-' + pad(dayNum);
          isOther = true;
        } else if (i >= startOffset + daysInMonth) {
          // Next month
          dayNum = i - startOffset - daysInMonth + 1;
          var nm = viewMonth === 11 ? 0 : viewMonth + 1;
          var ny = viewMonth === 11 ? viewYear + 1 : viewYear;
          dateStr = ny + '-' + pad(nm + 1) + '-' + pad(dayNum);
          isOther = true;
        } else {
          dayNum = i - startOffset + 1;
          dateStr = viewYear + '-' + pad(viewMonth + 1) + '-' + pad(dayNum);
        }

        var cls = 'cal-day';
        if (isOther) cls += ' other-month';
        if (dateStr === todayStr) cls += ' today';

        var dayEvents = getEventsForDate(dateStr);
        var evHtml = '';
        var maxShow = 3;
        for (var e = 0; e < Math.min(dayEvents.length, maxShow); e++) {
          var ev = dayEvents[e];
          evHtml += '<div class="cal-event color-' + ev.color + '" onclick="showEventPopup(' + EVENTS.indexOf(ev) + ')" title="' + escAttr(ev.title) + '">' + esc(ev.title) + '</div>';
        }
        if (dayEvents.length > maxShow) {
          evHtml += '<div class="cal-more" onclick="showDayPopup(\'' + dateStr + '\')">+' + (dayEvents.length - maxShow) + ' more</div>';
        }

        html += '<div class="' + cls + '" ondblclick="showDayPopup(\'' + dateStr + '\')">';
        html += '<span class="cal-day-num">' + dayNum + '</span>';
        html += evHtml;
        html += '</div>';
      }

      grid.innerHTML = html;
      renderSidebar();
    }

    /* ── Event helpers ────────────────────────────── */
    function getEventsForDate(dateStr) {
      var result = [];
      for (var i = 0; i < EVENTS.length; i++) {
        var ev = EVENTS[i];
        if (ev.endDate) {
          if (dateStr >= ev.date && dateStr <= ev.endDate) result.push(ev);
        } else {
          if (ev.date === dateStr) result.push(ev);
        }
      }
      return result;
    }

    function renderSidebar() {
      var container = document.getElementById('calUpcoming');
      var now = new Date();
      var todayStr = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
      // Show upcoming events for the next 60 days
      var sidebarEnd = new Date(now.getTime() + 60 * 86400000);
      var allUpcoming = expandRecurring(now, sidebarEnd);
      var upcoming = allUpcoming.filter(function(ev) {
        var end = ev.endDate || ev.date;
        return end >= todayStr;
      }).sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

      if (upcoming.length === 0) {
        container.innerHTML = '<div class="cal-sidebar-empty">No upcoming events</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < Math.min(upcoming.length, 10); i++) {
        var ev = upcoming[i];
        var dateLabel = formatDate(ev.date);
        if (ev.endDate) dateLabel += ' — ' + formatDate(ev.endDate);
        html += '<div class="cal-sidebar-event color-' + ev.color + '" onclick="showEventPopup(' + EVENTS.indexOf(ev) + ')">';
        html += '<div class="se-title">' + esc(ev.title) + '</div>';
        html += '<div class="se-date">' + dateLabel + '</div>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    /* ── Popups ───────────────────────────────────── */
    window.showEventPopup = function(idx) {
      var ev = EVENTS[idx];
      if (!ev) return;
      document.getElementById('epTitle').textContent = ev.title;
      document.getElementById('epDate').textContent = formatDate(ev.date) + (ev.endDate ? ' — ' + formatDate(ev.endDate) : '');
      document.getElementById('epTime').textContent = ev.time || 'All day';
      document.getElementById('epCategory').innerHTML = '<span class="ep-color-dot" style="background:' + (COLOR_HEX[ev.color] || '#ffb300') + '"></span>' + (ev.category || '—');
      var desc = document.getElementById('epDesc');
      if (ev.description) { desc.textContent = ev.description; desc.style.display = 'block'; } else { desc.style.display = 'none'; }
      document.getElementById('eventPopupOverlay').classList.add('open');
    };
    window.closeEventPopup = function() { document.getElementById('eventPopupOverlay').classList.remove('open'); };

    window.showDayPopup = function(dateStr) {
      var evts = getEventsForDate(dateStr);
      document.getElementById('dpTitle').textContent = formatDate(dateStr);
      var html = '';
      if (evts.length === 0) { html = '<div style="color:#666;font-style:italic;padding:8px 0;">No events on this day</div>'; }
      for (var i = 0; i < evts.length; i++) {
        var ev = evts[i];
        html += '<div class="dp-event color-' + ev.color + '" onclick="closeDayPopup();showEventPopup(' + EVENTS.indexOf(ev) + ')">';
        html += esc(ev.title);
        if (ev.time) html += '<div class="dp-time">' + ev.time + '</div>';
        html += '</div>';
      }
      document.getElementById('dpEvents').innerHTML = html;
      document.getElementById('dayPopupOverlay').classList.add('open');
    };
    window.closeDayPopup = function() { document.getElementById('dayPopupOverlay').classList.remove('open'); };

    // Close popups on overlay click
    document.getElementById('eventPopupOverlay').addEventListener('click', function(e) { if (e.target === this) closeEventPopup(); });
    document.getElementById('dayPopupOverlay').addEventListener('click', function(e) { if (e.target === this) closeDayPopup(); });

    /* ── Utilities ────────────────────────────────── */
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
    function formatDate(str) {
      var parts = str.split('-');
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
    }

    init();
  })();
  </script>
</body>
